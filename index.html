<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>果冻图库 - Jelly Gallery</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #2d3436;
    --text-secondary: #636e72;
    --accent-start: #ff6b6b;
    --accent-end: #ff8e53;
    --accent: #ff6b6b;
    --tag-bg: rgba(0,0,0,0.5);
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.12);
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border-bottom: 1px solid rgba(0,0,0,0.04);
    padding: 16px 24px;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-right: auto;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 12px rgba(255,107,107,0.3);
  }
  .stats {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    gap: 14px;
    align-items: center;
    background: rgba(0,0,0,0.03);
    padding: 6px 14px;
    border-radius: 100px;
  }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  }
  .dot-total { background: #a29bfe; }
  .dot-green { background: #00b894; }
  .dot-red { background: #ff7675; }
  .dot-gray { background: #b2bec3; }

  /* Buttons */
  .btn {
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid rgba(0,0,0,0.06);
    background: var(--card);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    color: var(--text);
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border: none;
    color: #fff;
    box-shadow: 0 4px 16px rgba(255,107,107,0.35);
  }
  .btn-primary:hover {
    box-shadow: 0 6px 24px rgba(255,107,107,0.45);
    color: #fff;
    transform: translateY(-2px) scale(1.02);
  }
  .btn.active {
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border: none;
    color: #fff;
    box-shadow: 0 4px 16px rgba(255,107,107,0.3);
  }

  /* Filters */
  .filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .filter-label {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-right: 4px;
  }

  /* Grid */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  @media (max-width: 640px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .header-inner { justify-content: center; }
    .stats { display: none; }
  }
  @media (min-width: 641px) and (max-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 1025px) and (max-width: 1440px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (min-width: 1441px) {
    .grid { grid-template-columns: repeat(5, 1fr); }
  }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    position: relative;
    opacity: 0;
    animation: popIn 0.5s forwards;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: var(--shadow-hover);
  }
  .img-wrap {
    aspect-ratio: 1 / 1;
    overflow: hidden;
    position: relative;
    background: #f8f9fa;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .card:hover img {
    transform: scale(1.1);
  }
  .card img.loading {
    opacity: 0;
    animation: shimmer 1.5s infinite;
    background: linear-gradient(90deg, #f8f9fa 25%, #eef0f2 50%, #f8f9fa 75%);
    background-size: 200% 100%;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .card img.loaded {
    opacity: 1;
  }

  /* Tag */
  .tag {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-4px);
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    background: var(--tag-bg);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .card:hover .tag, .tag.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .tag-gif { background: rgba(255,107,107,0.85); }
  .tag-vertical { background: rgba(77,171,247,0.85); }
  .tag-horizontal { background: rgba(38,166,154,0.85); }
  .tag-large { background: rgba(255,167,38,0.85); }
  .tag-normal { background: rgba(120,144,156,0.85); }

  /* Info overlay */
  .info-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 40px 14px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }
  .card:hover .info-overlay {
    opacity: 1;
  }
  .info-title {
    font-size: 13px;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .info-dim {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
  }

  /* Sentinel */
  .sentinel {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 14px;
    gap: 10px;
    margin-top: 20px;
  }
  .spinner {
    width: 22px;
    height: 22px;
    border: 3px solid rgba(0,0,0,0.06);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(15,15,19,0.96);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(10px);
  }
  .lightbox.active {
    display: flex;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .lightbox-close:hover {
    background: rgba(255,255,255,0.2);
    transform: rotate(90deg);
  }

  .empty-state {
    text-align: center;
    padding: 100px 20px;
    color: var(--text-secondary);
    grid-column: 1 / -1;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🍮</div>
      <span>果冻图库</span>
    </div>
    <div class="stats" id="stats">
      <span class="stat-item"><span class="stat-dot dot-green"></span>加载中...</span>
    </div>
    <button class="btn btn-primary" id="refreshBtn" onclick="refreshAll()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.5s" id="refreshIcon">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      换一批
    </button>
  </div>
</div>

<div class="filters">
  <span class="filter-label">分类筛选</span>
  <button class="btn active" data-cat="all" onclick="setCategory('all')">全部</button>
  <button class="btn" data-cat="gif" onclick="setCategory('gif')">动图</button>
  <button class="btn" data-cat="vertical" onclick="setCategory('vertical')">竖长图</button>
  <button class="btn" data-cat="horizontal" onclick="setCategory('horizontal')">横长图</button>
  <button class="btn" data-cat="large" onclick="setCategory('large')">高清大图</button>
  <button class="btn" data-cat="normal" onclick="setCategory('normal')">普通图</button>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="sentinel" id="sentinel">
    <div class="spinner"></div>
    <span>加载更多...</span>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const BATCH_SIZE = 15;
const LOAD_TIMEOUT = 5000;
const MIN_DIMENSION = 50;
const MAX_CONCURRENT = 6;
const JSON_URL = 'fuliba_images.json';

let allImages = [];
let state = {
  category: 'all',
  displayedIds: new Set(),
  rejectedIds: new Set(),
  failedCount: 0
};

let loadQueue = [];
let activeLoads = 0;

const lazyObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const card = entry.target;
      const id = parseInt(card.dataset.id);
      const item = allImages.find(i => i.id === id);
      if (item && !item.loadStarted && !item.failed) {
        item.loadStarted = true;
        lazyObserver.unobserve(card);
        enqueueLoad(item, card);
      }
    }
  });
}, { rootMargin: '400px 0px' });

const scrollObserver = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting) {
    loadBatch();
  }
}, { rootMargin: '500px' });

function optimizeUrl(url) {
  if (url.includes('sogoucdn.com') && url.includes('/q/100/')) {
    return url.replace('/q/100/', '/q/60/');
  }
  return url;
}

// Canvas 检测 sogou 占位图
function isPlaceholderByCanvas(img) {
  try {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const sampleW = Math.min(img.naturalWidth, 100);
    const sampleH = Math.min(img.naturalHeight, 100);
    canvas.width = sampleW;
    canvas.height = sampleH;
    ctx.drawImage(img, 0, 0, sampleW, sampleH);
    
    const imageData = ctx.getImageData(0, 0, sampleW, sampleH).data;
    const totalPixels = imageData.length / 4;
    let grayPixels = 0;
    let lightPixels = 0;
    
    for (let i = 0; i < imageData.length; i += 4) {
      const r = imageData[i], g = imageData[i+1], b = imageData[i+2];
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      const diff = max - min;
      const brightness = (r+g+b)/3;
      
      if (diff < 40) grayPixels++;
      if (brightness > 180) lightPixels++;
    }
    
    const grayRatio = grayPixels / totalPixels;
    const lightRatio = lightPixels / totalPixels;
    return grayRatio > 0.85 && lightRatio > 0.6;
  } catch (e) {
    return false;
  }
}

fetch(JSON_URL)
  .then(r => r.json())
  .then(data => {
    let id = 0;
    for (const [articleUrl, imgUrls] of Object.entries(data)) {
      const title = articleUrl.split('/').pop().replace('.html', '');
      imgUrls.forEach(imgUrl => {
        allImages.push({
          id: id++,
          articleUrl,
          imgUrl: optimizeUrl(imgUrl),
          originalUrl: imgUrl,
          title,
          loaded: false,
          width: 0,
          height: 0,
          categories: ['all'],
          failed: false,
          loadStarted: false
        });
      });
    }
    allImages.forEach(i => {
      if (i.imgUrl.toLowerCase().includes('.gif')) i.categories.push('gif');
    });
    updateStats();
    loadBatch();
    scrollObserver.observe(document.getElementById('sentinel'));
  })
  .catch(err => {
    document.getElementById('grid').innerHTML = `
      <div class="empty-state">
        <div style="font-size:20px; margin-bottom:10px; font-weight:600;">📂 加载失败</div>
        <div>${err.message}</div>
        <div style="margin-top:12px; font-size:13px; opacity:0.7">
          请确保 <code style="background:rgba(0,0,0,0.05); padding:3px 8px; border-radius:6px;">${JSON_URL}</code> 与本文件在同一目录
        </div>
      </div>`;
    document.getElementById('sentinel').style.display = 'none';
  });

function updateStats() {
  const total = allImages.length;
  const displayed = state.displayedIds.size;
  const failed = state.failedCount;
  const remaining = total - displayed - failed;
  
  document.getElementById('stats').innerHTML = `
    <span class="stat-item" title="图片总数"><span class="stat-dot dot-total"></span>${total}</span>
    <span class="stat-item" title="已显示"><span class="stat-dot dot-green"></span>${displayed}</span>
    <span class="stat-item" title="已失效"><span class="stat-dot dot-red"></span>${failed}</span>
    <span class="stat-item" title="剩余可用"><span class="stat-dot dot-gray"></span>${remaining}</span>
  `;
}

function clearAll() {
  document.querySelectorAll('.card').forEach(card => lazyObserver.unobserve(card));
  loadQueue = [];
  activeLoads = 0;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('sentinel').style.display = 'flex';
  document.getElementById('sentinel').innerHTML = '<div class="spinner"></div><span>加载更多...</span>';
}

function setCategory(cat) {
  if (state.category === cat) return;
  state.category = cat;
  state.displayedIds.clear();
  state.rejectedIds.clear();
  allImages.forEach(i => { i.loadStarted = false; });
  
  document.querySelectorAll('.filters .btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  
  clearAll();
  loadBatch();
}

function refreshAll() {
  const icon = document.getElementById('refreshIcon');
  icon.style.transform = `rotate(${Date.now()}deg)`;
  state.displayedIds.clear();
  state.rejectedIds.clear();
  allImages.forEach(i => { i.loadStarted = false; });
  clearAll();
  loadBatch();
}

function getPool() {
  const cat = state.category;
  return allImages.filter(i => {
    if (i.failed || state.displayedIds.has(i.id) || state.rejectedIds.has(i.id)) return false;
    if (cat === 'all') return true;
    if (cat === 'gif') return i.categories.includes('gif');
    if (i.loaded) return i.categories.includes(cat);
    return true;
  });
}

function pickRandom(pool, n) {
  const arr = [...pool];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n);
}

function loadBatch(count = BATCH_SIZE) {
  const pool = getPool();
  if (pool.length === 0) {
    const sentinel = document.getElementById('sentinel');
    if (state.displayedIds.size === 0) {
      sentinel.innerHTML = '<span>该分类暂无可用图片</span>';
    } else {
      sentinel.innerHTML = '<span>没有更多图片了</span>';
    }
    return;
  }
  
  const picks = pickRandom(pool, count);
  const grid = document.getElementById('grid');
  
  picks.forEach(item => {
    state.displayedIds.add(item.id);
    const card = createCard(item);
    grid.appendChild(card);
  });
  
  updateStats();
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = item.id;
  
  const wrap = document.createElement('div');
  wrap.className = 'img-wrap';
  
  const img = document.createElement('img');
  img.className = 'loading';
  img.referrerPolicy = 'no-referrer';
  img.decoding = 'async';
  wrap.appendChild(img);
  card.appendChild(wrap);
  
  // Info overlay
  const info = document.createElement('div');
  info.className = 'info-overlay';
  info.innerHTML = `<div class="info-title">${item.title}</div><div class="info-dim">加载中...</div>`;
  card.appendChild(info);
  
  card.onclick = () => {
    if (!item.failed) openLightbox(item.originalUrl);
  };
  
  lazyObserver.observe(card);
  return card;
}

function enqueueLoad(item, card) {
  loadQueue.push({item, card});
  processQueue();
}

function processQueue() {
  if (activeLoads >= MAX_CONCURRENT || loadQueue.length === 0) return;
  const {item, card} = loadQueue.shift();
  activeLoads++;
  doLoadImage(item, card, () => {
    activeLoads--;
    processQueue();
  });
}

function doLoadImage(item, card, onDone) {
  const img = card.querySelector('img');
  const infoDim = card.querySelector('.info-dim');
  let resolved = false;
  
  const timer = setTimeout(() => {
    if (!resolved) {
      resolved = true;
      removeCard(item, card, 'timeout');
      if (onDone) onDone();
    }
  }, LOAD_TIMEOUT);
  
  img.onload = () => {
    if (resolved) return;
    
    // Canvas 检测占位图
    if (isPlaceholderByCanvas(img)) {
      resolved = true;
      clearTimeout(timer);
      removeCard(item, card, 'placeholder');
      if (onDone) onDone();
      return;
    }
    
    if (img.naturalWidth < MIN_DIMENSION || img.naturalHeight < MIN_DIMENSION) {
      resolved = true;
      clearTimeout(timer);
      removeCard(item, card, 'tiny');
      if (onDone) onDone();
      return;
    }
    
    resolved = true;
    clearTimeout(timer);
    img.classList.remove('loading');
    img.classList.add('loaded');
    item.loaded = true;
    item.width = img.naturalWidth;
    item.height = img.naturalHeight;
    
    if (infoDim) infoDim.textContent = `${item.width} × ${item.height}`;
    
    classifyAndTag(item, card);
    if (onDone) onDone();
  };
  
  img.onerror = () => {
    if (resolved) return;
    resolved = true;
    clearTimeout(timer);
    removeCard(item, card, 'error');
    if (onDone) onDone();
  };
  
  img.src = item.imgUrl;
}

function removeCard(item, card, reason) {
  item.failed = true;
  state.failedCount++;
  state.displayedIds.delete(item.id);
  updateStats();
  
  card.style.transform = 'scale(0.9)';
  card.style.opacity = '0';
  setTimeout(() => {
    if (card.parentNode) card.remove();
    loadBatch(1);
  }, 300);
}

function classifyAndTag(item, card) {
  const ratio = item.height / item.width;
  const cats = ['all'];
  if (item.imgUrl.toLowerCase().includes('.gif')) cats.push('gif');
  if (ratio > 1.8) cats.push('vertical');
  else if (ratio < 0.5) cats.push('horizontal');
  else cats.push('normal');
  if (item.width > 1500 || item.height > 1500) cats.push('large');
  item.categories = cats;
  
  const tagMap = {gif: 'GIF', vertical: '竖长', horizontal: '横长', large: '高清', normal: '普通'};
  const primary = item.categories.find(c => c !== 'all' && tagMap[c]);
  if (primary) {
    const tag = document.createElement('span');
    tag.className = `tag tag-${primary} visible`;
    tag.textContent = tagMap[primary];
    card.querySelector('.img-wrap').appendChild(tag);
  }
  
  if (state.category !== 'all' && !item.categories.includes(state.category)) {
    state.rejectedIds.add(item.id);
    card.style.transform = 'scale(0.9)';
    card.style.opacity = '0';
    setTimeout(() => {
      if (card.parentNode) card.remove();
      state.displayedIds.delete(item.id);
      loadBatch(1);
    }, 300);
  }
}

function openLightbox(url) {
  const box = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = url;
  box.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const box = document.getElementById('lightbox');
  box.classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
